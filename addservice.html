<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="addservice.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="https://kit.fontawesome.com/418eadce47.js" crossorigin="anonymous"></script>
    </head>
    <body>
        <header>
            <h1 class="title">ADD <span>SERVICE</span> RECORD</h1>
        </header>
        <form>
            <h4>SERVICE DETAILS</h4>
            <div class="input-card">
                <i class="fa-solid fa-location-dot"></i>
                <label>Service Center Name</label><br>
                <input type="text">
            </div>
            <div class="input-card">
                <i class="fa-regular fa-calendar"></i>
                <label>Servicing Date</label><br>
                <input type="date">
            </div>
            <div class="input-card">
                <i class="fa-solid fa-gauge"></i>
                <label>Odometer Reading</label><br>
                <input type="number">
            </div>
            <div class="input-card">
                <i class="fa-solid fa-indian-rupee-sign"></i>
                <label>Servicing Amount</label><br>
                <input type="number">
            </div>
            <div class="input-card">
                <i class="fa-solid fa-pen"></i>
                <label>Notes regarding service(OPTIONAL)</label><br>
                <input type="textarea">
            </div>
            <button type="submit"><i class="fa-solid fa-check"></i> SAVE SERVICE RECORD</button>
        </form>
    </body>
</html>
