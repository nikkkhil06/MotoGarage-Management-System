<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="addservice.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="https://kit.fontawesome.com/418eadce47.js" crossorigin="anonymous"></script>
    </head>
    <body>
        <header>
            <h1 class="title">ADD <span>SERVICE</span> RECORD</h1>
        </header>
        <form>
            <h4>SERVICE DETAILS</h4>
            <div class="input-card">
                <i class="fa-solid fa-location-dot"></i>
                <section class="info">
                    <label>Service Center Name</label><br>
                    <input type="text">
                </section>
            </div>
            <div class="input-card">
                <i class="fa-regular fa-calendar"></i>
                <section class="info">
                    <label>Servicing Date</label><br>
                    <input type="date">
                </section>
            </div>
            <div class="input-card">
                <i class="fa-solid fa-gauge"></i>
                <section class="info">
                    <label>Odometer Reading</label><br>
                    <input type="number">
                </section>
            </div>
            <div class="input-card">
                <i class="fa-solid fa-indian-rupee-sign"></i>
                <section class="info">
                    <label>Servicing Amount</label><br>
                    <input type="number">
                </section>
            </div>
            <div class="input-card">
                <i class="fa-solid fa-pen"></i>
                <section class="info">
                    <label>Additional Notes (OPTIONAL)</label><br>
                    <input type="textarea">
                </section>
            </div>
            <div class="upload">
                <h5>Attach Bill(Image or PDF)</h5>
                <h6>Upload Your Service BILL For Future Reference</h6>
                <div class="upload-cont">
                    <div class="camera">
                        <i class="fa-regular fa-camera"></i>
                        <h5>Take Photo</h5>
                        <h6>Use Camera</h6>
                    </div>
                    <div class="bill">
                        <i class="fa-regular fa-file-lines"></i>
                        <h5>Upload Bill</h5>
                        <h6>Choose File</h6>
                    </div>
                </div>
                <h6>Supported formats: JPG,PNG,PDF (Max 10MB)</h6>
            </div>
            <button type="submit"> SAVE SERVICE RECORD</button>
        </form>
    </body>
</html>
