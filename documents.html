<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="documents.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="https://kit.fontawesome.com/418eadce47.js" crossorigin="anonymous"></script>
    </head>
    <body>
        <header>
            <h1 class="title">DOCU<span>MENTS</span></h1>
            <h4 class="subtitle">Access your documents here</h4>
        </header>
        <body>
            <div class="doc-cont">
                <div class="doc-card">
                    <i class="fa-regular fa-address-card"></i>
                    <section class="info">
                        <h3 class="doc-name">RC BOOK</h3>
                        <h5 class="file-name"></h5>
                        <h4 class="rc-status">No document uploaded</h4>
                    </section>
                    <div class="chevron">
                        <i class="fa-solid fa-chevron-right"></i>
                    </div>
                </div>
                <div class="doc-card">
                    <i class="fa-solid fa-shield-halved"></i>
                    <section class="info">
                        <h3 class="doc-name">INSURANCE</h3>
                        <h5 class="file-name"></h5>
                        <h4 class="insurance-status">No document uploaded</h4>
                    </section>
                    <div class="chevron">
                        <i class="fa-solid fa-chevron-right"></i>
                    </div>
                </div>
                <div class="doc-card">
                    <i class="fa-solid fa-file-circle-check"></i>
                    <section class="info">
                        <h3 class="doc-name">PUC</h3>
                        <h5 class="file-name"></h5>
                        <h4 class="puc-status">No document uploaded</h4>
                    </section>
                    <div class="chevron">
                        <i class="fa-solid fa-chevron-right"></i>
                    </div>
                </div>
                <div class="doc-card">
                    <i class="fa-regular fa-folder"></i>
                    <section class="info">
                        <h3 class="doc-name">OTHER DOCUMENTS</h3>
                    </section>
                    <div class="chevron">
                        <i class="fa-solid fa-chevron-right"></i>
                    </div>
                </div>
            </div>
        </body>
