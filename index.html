<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="index.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="https://kit.fontawesome.com/418eadce47.js" crossorigin="anonymous"></script>
    </head>
    <body>
        <div class="documents">
            <h6 class="quick-action-title">DOCUMENTS</h6>
            <div class="doc-main-cont">
                <div class="doc-cont">
                    <i class="fa-regular fa-file-lines"></i>
                        <section class="doc-info-box">
                            <h6 class="doc-cont-title">INSURANCE</h6>
                            <p class="doc-cont1-detail">Expires on<br>12 Dec 2026</p>
                            <ul>
                                <li class="doc-cont1-status"><p>Valid</p></li>
                            </ul>
                        </section>
                </div>
                <div class="doc-cont">
                    <i class="fa-regular fa-file-lines"></i>
                        <section class="doc-info-box">
                            <h6 class="doc-cont-title">RC BOOK</h6>
                            <p class="doc-cont2-detail">Expires on<br>30 Nov 2026</p>
                            <ul>
                                <li class="doc-cont2-status"><p>Valid</p></li>
                            </ul>
                        </section>
                </div>
                <div class="doc-cont">
                    <i class="fa-regular fa-file-lines"></i>
                        <section class="doc-info-box">
                            <h6 class="doc-cont-title">PUC</h6>
                            <p class="doc-cont3-detail">Expires on<br>24 Jun 2026</p>
                            <ul>
                                <li class="doc-cont3-status"><p>Valid</p></li>
                            </ul>
                        </section>
                </div>
            </div>
        </div>
        <div class="quick-action">
        <h6 class="quick-action-title">QUICK ACTIONS</h6>
        <div class="quick-actions-main-cont">
            <div class="quick-action-cont">
                <i class="fa-solid fa-screwdriver-wrench"></i><br>
                <span class="quick-action-card-title">ADD Service</span>
            </div>
            <div class="quick-action-cont">
                <i class="fa-regular fa-file"></i><br>
                <span class="quick-action-card-title">Upload File</span>
            </div>
            <div class="quick-action-cont">
                <i class="fa-solid fa-motorcycle"></i><br>
                <span class="quick-action-card-title">ADD Bike</span>
            </div>
            <div class="quick-action-cont">
                <i class="fa-solid fa-location-dot"></i><br>
                <span class="quick-action-card-title">Find Garage</span>
            </div>
        </div>
        </div>
        <div class="navbar-container">
            <nav>
            <a herf="#" class="active">
                <i class="fa-regular fa-house"></i>
                <span>Home</span>
            </a>
            <a herf="#">
                <i class="fa-solid fa-motorcycle"></i>
                <span>Sevices</span>
            </a>
            <a herf="#">
                <i class="fa-solid fa-plus"></i>
            </a>
            <a herf="#">
                <i class="fa-regular fa-file"></i>
                <span>Documents</span>
            </a>
            <a herf="#">
                <i class="fa-regular fa-user"></i>
                <span>Profile</span>
            </a>
        </nav>
        </div>
    </body>
</html>
