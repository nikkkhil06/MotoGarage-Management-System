<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="upload.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="https://kit.fontawesome.com/418eadce47.js" crossorigin="anonymous"></script>
    </head>
    <body>
        <header>
            <h1 class="title">UP<span>LOAD</span></h1>
            <h4 class="subtitle">Upload your documents here</h4>
        </header>
        <form>
            <div class="upload">
                <h5>Attach Bill(Image or PDF)</h5>
                <h6>Upload Your Service BILL For Future Reference</h6>
                <div class="upload-cont">
                    <div class="camera">
                        <i class="fa-regular fa-camera"></i>
                        <h5>Take Photo</h5>
                        <h6>Use Camera</h6>
                    </div>
                    <div class="bill">
                        <i class="fa-regular fa-file-lines"></i>
                        <h5>Upload Bill</h5>
                        <h6>Choose File</h6>
                    </div>
                </div>
                <h6>Supported formats: JPG,PNG,PDF (Max 10MB)</h6>
            </div>
            <button type="submit"> SAVE SERVICE RECORD</button>
        </form>
    </body>
</html>
